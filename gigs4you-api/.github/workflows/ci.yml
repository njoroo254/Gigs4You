name: Gigs4You API — CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-and-lint:
    name: Type-check & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint || true   # warn only for now

      - name: Build
        run: npm run build

  docker-build:
    name: Docker Build (smoke test)
    runs-on: ubuntu-latest
    needs: build-and-lint
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t gigs4you-api:${{ github.sha }} .

      - name: Tag latest
        run: docker tag gigs4you-api:${{ github.sha }} gigs4you-api:latest
