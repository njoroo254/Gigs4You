name: gigs4you
description: Gigs4You — Africa's Field Workforce & Skills Platform
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # HTTP
  dio: ^5.4.0

  # Secure storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^10.0.0

  # GPS
  geolocator: ^14.0.2

  # Camera & images
  image_picker: ^1.0.7

  # UI utilities
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  intl: ^0.20.2
  uuid: ^4.3.3
  connectivity_plus: ^7.1.1
  timeago: ^3.6.0
  sentry_flutter: ^8.14.2
  firebase_messaging: ^16.2.0
  firebase_core: ^4.7.0
  flutter_local_notifications: ^21.0.0
  socket_io_client: ^3.1.4
  app_links: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icons/icon_1024.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1B6B3A"
  adaptive_icon_foreground: "assets/icons/icon_1024.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
