version: '3.9'

services:
  # ── Application ──────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB:       gigs4you
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    secrets:
      - db_password
    networks:
      - internal

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redisdata:/data
    restart: unless-stopped
    networks:
      - internal

  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER:     ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
      MINIO_REGION_NAME:   us-east-1
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped
    networks:
      - internal

  api:
    build: ./gigs4you-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - S3_ENDPOINT=http://minio:9000
    depends_on:
      - postgres
      - redis
      - minio
    restart: unless-stopped
    secrets:
      - jwt_secret
      - mpesa_consumer_key
      - mpesa_consumer_secret
      - stripe_secret_key
      - fcm_service_account
      - metrics_token
    networks:
      - internal
      - public

  gigs4you-ai-service:
    build: ./gigs4you-ai-service
    ports:
      - "8001:8001"
    environment:
      - ENV=production
    depends_on:
      - redis
      - postgres
    restart: unless-stopped
    secrets:
      - metrics_token
    networks:
      - internal
      - public

  # ── Monitoring ───────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.51.0
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'            # allow POST /-/reload
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alerts:/etc/prometheus/alerts:ro
      - prometheusdata:/prometheus
    secrets:
      - metrics_token
    restart: unless-stopped
    networks:
      - internal
    # Do NOT expose port 9090 publicly — access via Grafana only

  alertmanager:
    image: prom/alertmanager:v0.27.0
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    volumes:
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanagerdata:/alertmanager
    environment:
      - SLACK_WEBHOOK_OPS=${SLACK_WEBHOOK_OPS}
      - SLACK_WEBHOOK_PAYMENTS=${SLACK_WEBHOOK_PAYMENTS}
      - SLACK_WEBHOOK_DEV=${SLACK_WEBHOOK_DEV}
    restart: unless-stopped
    networks:
      - internal

  grafana:
    image: grafana/grafana:10.4.2
    ports:
      - "3001:3000"    # Grafana UI accessible on host:3001
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SECURITY_ADMIN_USER=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=https://grafana.gigs4you.co.ke
      - GF_SMTP_ENABLED=false
    volumes:
      - grafanadata:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - internal
      - public

  # postgres_exporter — exposes PostgreSQL metrics for Prometheus
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    environment:
      DATA_SOURCE_NAME: "postgresql://${DB_USER}:${DB_PASSWORD}@postgres:5432/gigs4you?sslmode=disable"
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - internal

  # redis_exporter — exposes Redis metrics for Prometheus
  redis-exporter:
    image: oliver006/redis_exporter:v1.58.0
    environment:
      REDIS_ADDR: redis:6379
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - internal

volumes:
  pgdata:
  redisdata:
  miniodata:
  prometheusdata:
  alertmanagerdata:
  grafanadata:

networks:
  internal:   # service-to-service; not exposed
  public:     # reverse-proxy faces this network

secrets:
  db_password:
    file: ./secrets/db_password.txt
  jwt_secret:
    file: ./secrets/jwt_secret.txt
  mpesa_consumer_key:
    file: ./secrets/mpesa_consumer_key.txt
  mpesa_consumer_secret:
    file: ./secrets/mpesa_consumer_secret.txt
  stripe_secret_key:
    file: ./secrets/stripe_secret_key.txt
  fcm_service_account:
    file: ./secrets/fcm_service_account.json
  metrics_token:
    file: ./secrets/metrics_token.txt
