# ══════════════════════════════════════════════════════════════════════════════
# Gigs4You — Nginx Production Configuration
#
# Subdomains handled:
#   api.gigs4you.co.ke          → NestJS API (port 3000)
#   dashboard.gigs4you.co.ke    → React SPA (static files)
#   storage.gigs4you.co.ke      → MinIO object storage (port 9000)
#   grafana.gigs4you.co.ke      → Grafana (port 3001)
#   ai.gigs4you.co.ke           → FastAPI AI service (port 8001)
#   gigs4you.co.ke              → Landing page (static files, optional)
#
# Install:
#   sudo cp nginx/gigs4you.conf /etc/nginx/sites-available/gigs4you
#   sudo ln -sf /etc/nginx/sites-available/gigs4you /etc/nginx/sites-enabled/gigs4you
#   sudo certbot --nginx -d api.gigs4you.co.ke -d dashboard.gigs4you.co.ke \
#                        -d storage.gigs4you.co.ke -d grafana.gigs4you.co.ke \
#                        -d ai.gigs4you.co.ke -d gigs4you.co.ke
#   sudo nginx -t && sudo systemctl reload nginx
# ══════════════════════════════════════════════════════════════════════════════

# ── Shared security headers ────────────────────────────────────────────────────
map $upstream_http_x_frame_options $x_frame_options_val {
    default $upstream_http_x_frame_options;
    ""      "DENY";
}

# ── Rate-limit zones ──────────────────────────────────────────────────────────
# 10 MB state = ~160 000 IP addresses
limit_req_zone $binary_remote_addr zone=api_general:10m  rate=60r/m;
limit_req_zone $binary_remote_addr zone=api_auth:10m     rate=10r/m;
limit_req_zone $binary_remote_addr zone=api_upload:10m   rate=20r/m;

# ── Upstream pools ─────────────────────────────────────────────────────────────
upstream api_backend {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream ai_backend {
    server 127.0.0.1:8001;
    keepalive 8;
}

upstream minio_backend {
    server 127.0.0.1:9000;
    keepalive 16;
}

upstream grafana_backend {
    server 127.0.0.1:3001;
    keepalive 8;
}

# ══════════════════════════════════════════════════════════════════════════════
# HTTP → HTTPS redirect (all subdomains)
# ══════════════════════════════════════════════════════════════════════════════
server {
    listen 80;
    server_name gigs4you.co.ke
                api.gigs4you.co.ke
                dashboard.gigs4you.co.ke
                storage.gigs4you.co.ke
                grafana.gigs4you.co.ke
                ai.gigs4you.co.ke;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ══════════════════════════════════════════════════════════════════════════════
# API — api.gigs4you.co.ke
# ══════════════════════════════════════════════════════════════════════════════
server {
    listen 443 ssl http2;
    server_name api.gigs4you.co.ke;

    ssl_certificate     /etc/letsencrypt/live/api.gigs4you.co.ke/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.gigs4you.co.ke/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"  always;
    add_header X-Frame-Options           "DENY"     always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

    # Upload limit — match NestJS BODY_SIZE_LIMIT (2 MB) + overhead
    client_max_body_size 12m;

    # Auth endpoints — strict rate limit
    location ~ ^/api/v1/auth/(login|register|refresh|forgot-password|reset-password) {
        limit_req zone=api_auth burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://api_backend;
        include /etc/nginx/proxy_params;
    }

    # Upload endpoints — looser limit, larger body
    location ~ ^/api/v1/upload {
        limit_req zone=api_upload burst=10 nodelay;
        client_max_body_size 12m;
        proxy_pass http://api_backend;
        include /etc/nginx/proxy_params;
        proxy_read_timeout 120s;
    }

    # WebSocket (Socket.IO)
    location /socket.io/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Health endpoints — no rate limit, no auth
    location ~ ^/health {
        proxy_pass http://api_backend;
        include /etc/nginx/proxy_params;
        access_log off;
    }

    # Everything else
    location / {
        limit_req zone=api_general burst=30 nodelay;
        limit_req_status 429;
        proxy_pass http://api_backend;
        include /etc/nginx/proxy_params;
    }
}

# ══════════════════════════════════════════════════════════════════════════════
# Dashboard — dashboard.gigs4you.co.ke
# ══════════════════════════════════════════════════════════════════════════════
server {
    listen 443 ssl http2;
    server_name dashboard.gigs4you.co.ke;

    ssl_certificate     /etc/letsencrypt/live/api.gigs4you.co.ke/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.gigs4you.co.ke/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff"  always;
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline' https://browser.sentry-cdn.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://storage.gigs4you.co.ke; connect-src 'self' https://api.gigs4you.co.ke wss://api.gigs4you.co.ke https://sentry.io; font-src 'self' data:;"
        always;

    root  /var/www/dashboard.gigs4you.co.ke/html;
    index index.html;

    # Immutable static assets (Vite fingerprints them)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # SPA fallback — let React Router handle all routes
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }
}

# ══════════════════════════════════════════════════════════════════════════════
# Object Storage — storage.gigs4you.co.ke
# ══════════════════════════════════════════════════════════════════════════════
server {
    listen 443 ssl http2;
    server_name storage.gigs4you.co.ke;

    ssl_certificate     /etc/letsencrypt/live/api.gigs4you.co.ke/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.gigs4you.co.ke/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=63072000" always;

    # Block direct access to private kyc-documents bucket
    location ~ ^/gigs4you/kyc-documents/ {
        return 403;
    }

    # Large uploads (MinIO multipart)
    client_max_body_size 50m;

    location / {
        proxy_pass http://minio_backend;
        include /etc/nginx/proxy_params;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        # Allow CORS for presigned URL downloads from the app
        add_header Access-Control-Allow-Origin  "https://dashboard.gigs4you.co.ke" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS"               always;
        add_header Access-Control-Allow-Headers "Authorization, Range"             always;
    }
}

# ══════════════════════════════════════════════════════════════════════════════
# AI service — ai.gigs4you.co.ke  (internal — restrict by IP if desired)
# ══════════════════════════════════════════════════════════════════════════════
server {
    listen 443 ssl http2;
    server_name ai.gigs4you.co.ke;

    ssl_certificate     /etc/letsencrypt/live/api.gigs4you.co.ke/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.gigs4you.co.ke/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=63072000" always;

    # Only allow calls from the API container IP range — adjust for your VPS
    # allow 127.0.0.1;
    # allow 172.18.0.0/16;  # Docker bridge network
    # deny all;

    location / {
        proxy_pass http://ai_backend;
        include /etc/nginx/proxy_params;
        proxy_read_timeout 120s;
    }
}

# ══════════════════════════════════════════════════════════════════════════════
# Grafana — grafana.gigs4you.co.ke
# ══════════════════════════════════════════════════════════════════════════════
server {
    listen 443 ssl http2;
    server_name grafana.gigs4you.co.ke;

    ssl_certificate     /etc/letsencrypt/live/api.gigs4you.co.ke/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.gigs4you.co.ke/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=63072000" always;
    add_header X-Frame-Options "SAMEORIGIN" always;

    location / {
        proxy_pass http://grafana_backend;
        include /etc/nginx/proxy_params;
    }

    # Grafana live WebSocket
    location /api/live/ {
        proxy_pass http://grafana_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
    }
}
