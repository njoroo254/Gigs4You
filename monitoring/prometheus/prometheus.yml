global:
  scrape_interval:     15s
  evaluation_interval: 15s
  external_labels:
    environment: production
    app: gigs4you

rule_files:
  - /etc/prometheus/alerts/*.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  # ── NestJS API ─────────────────────────────────────────────────────────────
  - job_name: gigs4you-api
    metrics_path: /metrics
    scheme: http
    authorization:
      credentials_file: /run/secrets/metrics_token
    static_configs:
      - targets: ['api:3000']
        labels:
          service: api

  # ── AI Service ─────────────────────────────────────────────────────────────
  - job_name: gigs4you-ai
    metrics_path: /metrics
    scheme: http
    authorization:
      credentials_file: /run/secrets/metrics_token
    static_configs:
      - targets: ['gigs4you-ai-service:8001']
        labels:
          service: ai

  # ── PostgreSQL (via postgres_exporter) ─────────────────────────────────────
  - job_name: postgres
    static_configs:
      - targets: ['postgres-exporter:9187']
        labels:
          service: database

  # ── Redis (via redis_exporter) ─────────────────────────────────────────────
  - job_name: redis
    static_configs:
      - targets: ['redis-exporter:9121']
        labels:
          service: cache

  # ── Prometheus self-monitoring ─────────────────────────────────────────────
  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
