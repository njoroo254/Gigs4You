global:
  # How long to wait before re-firing a resolved alert
  resolve_timeout: 5m
  # SMTP (optional — configure if using email)
  # smtp_from: alerts@gigs4you.co.ke
  # smtp_smarthost: smtp.gmail.com:587

route:
  receiver: default
  group_by: ['alertname', 'severity']
  group_wait:      30s   # wait before sending the first notification in a group
  group_interval:  5m    # how often to send notifications for ongoing alerts
  repeat_interval: 4h    # re-notify if the alert is still firing after this period

  routes:
    # Critical alerts → immediate channel
    - match:
        severity: critical
      receiver: critical
      repeat_interval: 1h

    # Payment alerts → payments team channel
    - match:
        team: payments
      receiver: payments
      repeat_interval: 30m

    # Dev-team alerts (latency, event loop, slow queries)
    - match:
        team: dev
      receiver: dev
      repeat_interval: 8h

receivers:
  # ── Default (ops team) ───────────────────────────────────────────────────────
  - name: default
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_OPS}'    # set in alertmanager env
        channel: '#alerts-ops'
        title: '[{{ .Status | toUpper }}] {{ .CommonAnnotations.summary }}'
        text: |
          {{ range .Alerts }}
          *Alert:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Severity:* {{ .Labels.severity }}
          {{ if .Annotations.runbook }}*Runbook:* {{ .Annotations.runbook }}{{ end }}
          {{ end }}
        send_resolved: true

  # ── Critical (pages ops) ────────────────────────────────────────────────────
  - name: critical
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_OPS}'
        channel: '#alerts-critical'
        title: '🔴 CRITICAL: {{ .CommonAnnotations.summary }}'
        text: |
          {{ range .Alerts }}
          {{ .Annotations.description }}
          {{ if .Annotations.runbook }}Runbook: {{ .Annotations.runbook }}{{ end }}
          {{ end }}
        send_resolved: true
    # Uncomment to add PagerDuty:
    # pagerduty_configs:
    #   - routing_key: '${PAGERDUTY_INTEGRATION_KEY}'

  # ── Payments team ────────────────────────────────────────────────────────────
  - name: payments
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_PAYMENTS}'
        channel: '#alerts-payments'
        title: '[{{ .Status | toUpper }}] {{ .CommonAnnotations.summary }}'
        text: |
          {{ range .Alerts }}
          {{ .Annotations.description }}
          {{ end }}
        send_resolved: true

  # ── Dev team ─────────────────────────────────────────────────────────────────
  - name: dev
    slack_configs:
      - api_url: '${SLACK_WEBHOOK_DEV}'
        channel: '#alerts-dev'
        title: '[{{ .Status | toUpper }}] {{ .CommonAnnotations.summary }}'
        text: |
          {{ range .Alerts }}
          {{ .Annotations.description }}
          {{ end }}
        send_resolved: true

inhibit_rules:
  # Suppress warning alerts when a critical alert fires for the same service
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ['job']
