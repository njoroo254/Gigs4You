name: Deploy to Production

on:
  push:
    branches: [main]

# Only one deploy at a time — queue the next, cancel the oldest pending
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  # ── Pre-deploy checks ────────────────────────────────────────────────────────
  api-ci:
    name: API — Type-check & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gigs4you-api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: gigs4you-api/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  dashboard-build:
    name: Dashboard — Build static assets
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: gigs4you-dashboard

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: gigs4you-dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: https://api.gigs4you.co.ke
          VITE_WS_URL: wss://api.gigs4you.co.ke
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}

      # Upload the built assets so the deploy job can rsync them to the server
      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dashboard-dist
          path: gigs4you-dashboard/dist
          retention-days: 1

  # ── Deploy ───────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [api-ci, dashboard-build]
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Download dashboard dist
        uses: actions/download-artifact@v4
        with:
          name: dashboard-dist
          path: dashboard-dist

      # ── 1. Deploy API + AI service via SSH ──────────────────────────────
      - name: Deploy API & AI service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            set -euo pipefail
            cd /opt/gigs4you

            echo "→ Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            echo "→ Building API image..."
            docker compose -f docker-compose.prod.yml build api

            echo "→ Building AI service image..."
            docker compose -f docker-compose.prod.yml build gigs4you-ai-service

            echo "→ Running DB migrations..."
            docker compose -f docker-compose.prod.yml run --rm --no-deps api \
              sh -c "NODE_ENV=production npm run migration:run"

            echo "→ Rolling restart (zero-downtime)..."
            docker compose -f docker-compose.prod.yml up -d \
              --no-deps --remove-orphans \
              api gigs4you-ai-service

            echo "→ Health check..."
            sleep 8
            curl -sf http://localhost:3000/health/ready || \
              (echo "API health check FAILED — rolling back" && \
               docker compose -f docker-compose.prod.yml restart api && exit 1)

            echo "→ Pruning old images..."
            docker image prune -f --filter "until=24h"

            echo "✓ Deploy complete"

      # ── 2. Rsync dashboard static files to Nginx webroot ────────────────
      - name: Deploy dashboard static files
        uses: appleboy/scp-action@v0.1.7
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          source:   dashboard-dist/*
          target:   /var/www/dashboard.gigs4you.co.ke/html/
          strip_components: 1

      - name: Reload Nginx
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key:      ${{ secrets.DEPLOY_SSH_KEY }}
          script: nginx -t && systemctl reload nginx

  # ── Notify on failure ────────────────────────────────────────────────────────
  notify-failure:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: [deploy]
    if: failure()
    steps:
      - name: Post Slack alert
        if: ${{ secrets.SLACK_WEBHOOK_DEV != '' }}
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": ":x: *Deploy FAILED* on `${{ github.ref_name }}` by ${{ github.actor }}\n${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_DEV }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
