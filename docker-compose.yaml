version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: gigs4you_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gigs4you}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in your .env file}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: gigs4you_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: gigs4you_minio
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER must be set in your .env file}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD must be set in your .env file}
      MINIO_REGION_NAME: ${MINIO_REGION_NAME:-us-east-1}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    restart: unless-stopped

  gigs4you-ai-service:
    build: ./gigs4you-ai-service
    container_name: gigs4you_ai_service
    ports:
      - "8001:8001"
    env_file:
      - ./gigs4you-ai-service/.env
    environment:
      - ENV=${NODE_ENV:-development}
      - AI_SERVICE_URL=${AI_SERVICE_URL:-http://localhost:8001}
    volumes:
      - ./gigs4you-ai-service:/app
    restart: unless-stopped
    depends_on:
      - redis

volumes:
  pgdata:
  miniodata:
