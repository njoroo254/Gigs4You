name: gigs4you
description: Gigs4You — Africa's Field Workforce & Skills Platform
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # HTTP
  dio: ^5.4.0

  # Secure storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # GPS
  geolocator: ^10.1.0

  # Camera & images
  image_picker: ^1.0.7

  # UI utilities
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  intl: ^0.19.0
  uuid: ^4.3.3
  connectivity_plus: ^6.0.3
  timeago: ^3.6.0
  sentry_flutter: ^7.19.0
  firebase_messaging: ^14.9.0
  firebase_core: ^2.32.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
